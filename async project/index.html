<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        html,body{
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-50 font-sans">

  <!-- Header -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-gray-800">GitHub Explorer</h1>
      <nav>
        <ul class="flex space-x-6 text-gray-600 font-medium">
          <li><a href="#" class="hover:text-gray-900">Home</a></li>
          <li><a href="#" class="hover:text-gray-900">About</a></li>
          <li><a href="#" class="hover:text-gray-900">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Search Section -->
  <section class="max-w-3xl mx-auto mt-12 px-6">
    <div class="bg-white shadow-lg rounded-lg p-8">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">Search GitHub User</h2>
      <form class="flex space-x-4">
        <input 
          type="text" 
          placeholder="Enter GitHub username..." 
          class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
        <button 
          type="submit" 
          class="px-6 py-2 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition"
        >
          Search
        </button>
      </form>
    </div>
  </section>

  <!-- Results Section -->
  <section class="max-w-4xl mx-auto mt-12 px-6">
    <div class="bg-white shadow-lg rounded-lg p-8">
      <h3 class="text-lg font-semibold text-gray-800 mb-6">User Details</h3>
      
      <!-- Example User Card -->
      <div class="flex items-center space-x-6">
        <img src="https://via.placeholder.com/120" alt="User Avatar" class="w-24 h-24 rounded-full border">
        <div>
          <h4 class="text-xl font-bold text-gray-900">Username</h4>
          <p class="text-gray-600">Bio or description goes here. This section will display user information fetched from GitHub.</p>
          <div class="mt-4 flex space-x-4">
            <span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-lg text-sm">Followers: 120</span>
            <span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-lg text-sm">Following: 80</span>
            <span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-lg text-sm">Repos: 45</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="mt-16 bg-white border-t">
    <div class="max-w-7xl mx-auto px-6 py-6 text-center text-gray-500">
      © 2026 GitHub Explorer. All rights reserved.
    </div>
  </footer>

</body></html>
